<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <!-- MediaPipe Hand Landmarker -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    #video { display: none; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <script>
    const vision = window.tasksVision;
    let handLandmarker;
    let video = document.getElementById('video');
    let lastVideoTime = -1;

    async function init() {
      // 1. Initialize Landmarker
      const filesetResolver = await vision.FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
      );
      handLandmarker = await vision.HandLandmarker.createFromOptions(filesetResolver, {
        baseOptions: {
          modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numHands: 1
      });

      // 2. Start Camera
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      video.addEventListener('loadeddata', predict);
      
      console.log("Gesture Bridge Initialized");
    }

    async function predict() {
      if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        const results = handLandmarker.detectForVideo(video, performance.now());
        
        if (results.landmarks && results.landmarks.length > 0) {
          const hand = results.landmarks[0];
          // We only need the primary landmarks for the cursor (Index Finger Tip + Palm)
          // Index Finger Tip is Point 8
          const indexFinger = hand[8];
          
          // Detect "Fist" (Grab) vs "Palm" (Release)
          // Simple heuristic: If tips of fingers (8, 12, 16, 20) are close to palm (0)
          const isFist = detectFist(hand);

          const message = {
            type: 'landmarks',
            x: indexFinger.x,
            y: indexFinger.y,
            isFist: isFist
          };

          // Send to Flutter
          if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage(JSON.stringify(message));
          }
        } else {
            // Send empty if no hand detected
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(JSON.stringify({ type: 'empty' }));
            }
        }
      }
      requestAnimationFrame(predict);
    }

    function detectFist(landmarks) {
      // Simple heuristic: distance between finger tips and wrist
      // Wrist is 0. Tips are 8, 12, 16, 20.
      const wrist = landmarks[0];
      const sumDist = [8, 12, 16, 20].reduce((acc, i) => {
        const d = Math.sqrt(Math.pow(landmarks[i].x - wrist.x, 2) + Math.pow(landmarks[i].y - wrist.y, 2));
        return acc + d;
      }, 0);
      // If fingers are tucked in, total distance is very small
      return sumDist < 0.6; 
    }

    init();
  </script>
</body>
</html>
