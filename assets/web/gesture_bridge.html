<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
    #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>

  <script type="module">
    import { FilesetResolver, HandLandmarker } from
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/vision_bundle.mjs";

    let handLandmarker = null;
    const video = document.getElementById('video');
    let isTracking = false;
    let lastVideoTime = -1;
    let cameraStream = null;

    /* ── Communication Layer ─────────────────────────── */
    function send(obj) {
      const s = JSON.stringify(obj);
      if (window.FlutterChannel)                        FlutterChannel.postMessage(s);
      else if (window.chrome && window.chrome.webview)  window.chrome.webview.postMessage(s);
    }
    function log(m) { send({type:'log', message:m}); }

    /* ── Gesture Classifier ──────────────────────────── */
    function classifyGesture(hand) {
      const tips    = [hand[8], hand[12], hand[16], hand[20]];
      const pips    = [hand[6], hand[10], hand[14], hand[18]];
      const wrist   = hand[0];
      const thumbTip = hand[4];
      const thumbIp  = hand[3];

      let extended = 0;
      for (let i = 0; i < 4; i++) {
        if (tips[i].y < pips[i].y) extended++;
      }
      const thumbOut = Math.abs(thumbTip.x - wrist.x) > Math.abs(thumbIp.x - wrist.x);

      if (extended <= 1 && !thumbOut)       return {id:'fist',    name:'Closed Fist'};
      if (extended === 4 && thumbOut)        return {id:'palm',    name:'Open Palm'};
      if (extended === 1 && tips[0].y < pips[0].y) return {id:'pointer', name:'Pointer'};
      if (extended === 2 && tips[0].y < pips[0].y && tips[1].y < pips[1].y)
                                               return {id:'victory', name:'Victory'};
      if (!extended && thumbOut)             return {id:'thumbs',  name:'Thumbs Up'};
      return {id:'unknown', name:'Tracking...'};
    }

    /* ── MediaPipe Init ──────────────────────────────── */
    async function initEngine() {
      try {
        log("Loading MediaPipe WASM...");
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
        );
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          numHands: 1
        });
        log("MediaPipe engine ready.");
        send({type:'ready'});
      } catch (e) {
        log("MediaPipe init error: " + e.toString());
      }
    }

    /* ── Camera Control ──────────────────────────────── */
    async function toggleCamera(on) {
      log("toggleCamera(" + on + ")");
      try {
        if (on && !cameraStream) {
          cameraStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: {ideal:640}, height: {ideal:480} }
          });
          video.srcObject = cameraStream;
          await video.play();
          isTracking = true;
          log("Camera live. Starting predict loop.");
          predict();
        } else if (!on && cameraStream) {
          isTracking = false;
          cameraStream.getTracks().forEach(t => t.stop());
          cameraStream = null;
          video.srcObject = null;
          log("Camera stopped.");
        }
      } catch (e) {
        log("Camera error: " + e.toString());
      }
    }

    /* ── Command Dispatch ────────────────────────────── */
    window.dispatchCommand = (cmd) => {
      log("Command received: " + cmd);
      if (cmd === 'START') toggleCamera(true);
      if (cmd === 'STOP')  toggleCamera(false);
    };
    // Windows WebView2
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.addEventListener('message', e => {
        if (e.data && e.data.command) window.dispatchCommand(e.data.command);
      });
    }

    /* ── Prediction Loop ─────────────────────────────── */
    async function predict() {
      if (!isTracking) return;
      if (video.currentTime !== lastVideoTime && handLandmarker) {
        lastVideoTime = video.currentTime;
        const results = handLandmarker.detectForVideo(video, performance.now());
        if (results.landmarks && results.landmarks.length > 0) {
          const hand = results.landmarks[0];
          const g = classifyGesture(hand);
          send({ type:'landmarks', x: hand[8].x, y: hand[8].y,
                 isFist: g.id === 'fist', gesture: g.name });
        } else {
          send({type:'empty'});
        }
      }
      requestAnimationFrame(predict);
    }

    /* ── Boot ─────────────────────────────────────────── */
    initEngine();
  </script>
</body>
</html>
