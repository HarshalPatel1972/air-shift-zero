<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    #video { 
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Mirror for natural feel */
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <script type="module">
    import {
      HandLandmarker,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

    let handLandmarker;
    let video = document.getElementById('video');
    let lastVideoTime = -1;
    let isTracking = false;
    let cameraStream = null;

    function flutterLog(msg) {
      const data = JSON.stringify({ type: 'log', message: msg });
      if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(data);
      } else if (window.FlutterChannel) {
        window.FlutterChannel.postMessage(data);
      }
    }

    async function initEngine() {
      try {
        flutterLog("Pre-warming MediaPipe Engine...");
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
        );
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          numHands: 1
        });
        flutterLog("Landmarker Ready.");
      } catch (e) {
        flutterLog("ERROR in initEngine: " + e.toString());
      }
    }

    async function toggleCamera(enabled) {
      try {
          if (enabled && !cameraStream) {
            flutterLog("Activating Camera Hardware...");
            cameraStream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                  facingMode: "user",
                  width: { ideal: 640 }, 
                  height: { ideal: 480 } 
                } 
            });
            video.srcObject = cameraStream;
            video.onloadeddata = () => {
                video.play();
                isTracking = true;
                predict();
            };
            flutterLog("Camera Hardware Active.");
          } else if (!enabled && cameraStream) {
            flutterLog("Deactivating Camera Hardware...");
            isTracking = false;
            cameraStream.getTracks().forEach(track => track.stop());
            cameraStream = null;
            video.srcObject = null;
            flutterLog("Camera Hardware Off.");
          }
      } catch (e) {
          flutterLog("ToggleCamera Error: " + e.toString());
      }
    }

    // Android/Generic Bridge Hook
    window.dispatchCommand = (cmd) => {
       if (cmd === 'START') toggleCamera(true);
       if (cmd === 'STOP') toggleCamera(false);
    };

    if (window.chrome && window.chrome.webview) {
        window.chrome.webview.addEventListener('message', (event) => {
            if (event.data.command === 'START') toggleCamera(true);
            if (event.data.command === 'STOP') toggleCamera(false);
        });
    }

    async function predict() {
      if (!isTracking) return;
      if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        
        if (handLandmarker) {
          const results = handLandmarker.detectForVideo(video, performance.now());
          
          if (results.landmarks && results.landmarks.length > 0) {
            const hand = results.landmarks[0];
            const indexFinger = hand[8];
            const gesture = classifyGesture(hand);

            const message = {
              type: 'landmarks',
              x: indexFinger.x,
              y: indexFinger.y,
              isFist: gesture.id === 'fist',
              gesture: gesture.name
            };
            
            const data = JSON.stringify(message);
            if (window.chrome && window.chrome.webview) {
              window.chrome.webview.postMessage(data);
            } else if (window.FlutterChannel) {
              window.FlutterChannel.postMessage(data);
            }
          } else {
            const data = JSON.stringify({ type: 'empty' });
            if (window.chrome && window.chrome.webview) {
               window.chrome.webview.postMessage(data);
            } else if (window.FlutterChannel) {
               window.FlutterChannel.postMessage(data);
            }
          }
        }
      }
      if (isTracking) requestAnimationFrame(predict);
    }

    function classifyGesture(landmarks) {
      const isExtended = (tip, base) => landmarks[tip].y < landmarks[base].y;
      const index = isExtended(8, 6);
      const middle = isExtended(12, 10);
      const ring = isExtended(16, 14);
      const pinky = isExtended(20, 18);
      const thumb = Math.abs(landmarks[4].x - landmarks[0].x) > 0.08;

      if (index && middle && ring && pinky) return { id: 'palm', name: 'Open Palm' };
      if (index && middle && !ring && !pinky) return { id: 'victory', name: 'Victory (V)' };
      if (index && !middle && !ring && !pinky) return { id: 'pointer', name: 'Pointer Finger' };
      if (!index && !middle && !ring && !pinky) return { id: 'fist', name: 'Closed Fist' };

      return { id: 'unknown', name: 'Tracking...' };
    }

    // Diagnostics
    setInterval(() => {
        if (isTracking && video.paused && cameraStream) {
            video.play();
        }
    }, 2000);

    initEngine();
  </script>
</body>
</html>
